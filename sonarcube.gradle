apply plugin: 'org.sonarqube'

sonarqube {
    properties {
        property "sonar.projectKey", "jameshnsears_QuoteUnquote"
        property "sonar.organization", "jameshnsears-github"
        property "sonar.projectName", "QuoteUnquote"
        property "sonar.host.url", "https://sonarcloud.io"
        
        property "sonar.sources", "src/fdroid/, src/main"
        property "sonar.test", "src/androidTest, src/manifestTest, src/test"
    }
}
