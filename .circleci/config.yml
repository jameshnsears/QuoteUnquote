version: 2.1
jobs:
  build:
    machine:
      image: android:202102-01
    steps:
      - checkout
      - run: git submodule sync
      - run: git submodule update --init
      - run:
          name: Create avd
          command: |
            SYSTEM_IMAGES="system-images;android-29;default;x86"
            sdkmanager "$SYSTEM_IMAGES"
            echo "no" | avdmanager --verbose create avd -n test -k "$SYSTEM_IMAGES"
      - run:
          name: Launch emulator
          command: |
            emulator -avd test -delay-adb -verbose -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          background: true
      - run:
          name: Generate cache key
          command: |
            find . -name 'build.gradle' | sort | xargs cat |
            shasum | awk '{print $1}' > /tmp/gradle_cache_seed
      - restore_cache:
          key: gradle-v1-{{ arch }}-{{ checksum "/tmp/gradle_cache_seed" }}
      - run:
          # run in parallel with the emulator starting up, to optimize build time
          name: local.properties
          command: |
            echo $LOCALPROPERTIES | base64 --decode > local.properties
            echo $LOCALPROPERTIESCLOUDLIB | base64 --decode > QuoteUnquote.cloudLib/cloudLib/local.properties
            echo $LOCALPROPERTIESUTILSLIB | base64 --decode > QuoteUnquote.utilsLib/utilsLib/local.properties
      - run:
          name: Wait for emulator to start
          command: |
            circle-android wait-for-boot
      - run:
          name: Disable emulator animations
          command: |
            adb shell settings put global window_animation_scale 0.0
            adb shell settings put global transition_animation_scale 0.0
            adb shell settings put global animator_duration_scale 0.0
      - run:
          name: combined coverage for each variant
          command: |
            MAX_TRIES=2
            run_with_retry() {
               n=1
               until [ $n -gt $MAX_TRIES ]
               do
                  echo "Starting test attempt $n"
                  ./gradlew clean :app:testGoogleplayDebugCoverageCombined --stacktrace
                  # bash <(curl https://codecov.io/bash) -t $CODECOVIOTOKEN -f app/build/reports/GoogleplayDebug.xml -F app.gooleplay
                  ./gradlew clean :app:testFdroidDebugCoverageCombined --stacktrace
                  # bash <(curl https://codecov.io/bash) -t $CODECOVIOTOKEN -f app/build/reports/FdroidDebug.xml -F app.froid
                  n=$[$n+1]
                  sleep 5
               done
               if [ $n -gt $MAX_TRIES ]; then
                 echo "Max tries reached ($MAX_TRIES)"
                 exit 1
               fi
            }
            run_with_retry
      - save_cache:
          key: gradle-v1-{{ arch }}-{{ checksum "/tmp/gradle_cache_seed" }}
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper

workflows:
  build:
    jobs:
      - build
