name: coverage-app-manifest

on:
  push:
    branches:
  pull_request:
    branches:

jobs:
  coverage-app-manifest:
    name: coverage-app-manifest
    runs-on: macos-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: local.properties
        env:
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
        run: echo "$LOCAL_PROPERTIES" | base64 -d > local.properties

      - name: app
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          script: ./gradlew :app:testManifestTestDebugCoverage

      - name: publish app.manifestTest
        run: |
          set -x
          ls -al app/build/reports/*.xml
          bash <(curl https://codecov.io/bash) -t ${{ secrets.CODECOVIO_TOKEN }} -f app/build/reports/ManifestTestDebug.xml -F app.manifestTest
